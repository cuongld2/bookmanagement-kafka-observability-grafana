apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-config
  namespace: bookmanagement
data:
  server.properties: |
    # Listeners
    listeners=PLAINTEXT://0.0.0.0:9092
    advertised.listeners=PLAINTEXT://kafka.bookmanagement.svc.cluster.local:9092
    listener.security.protocol.map=PLAINTEXT:PLAINTEXT
    
    # Broker settings
    broker.id=0
    
    # Replication
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    
    # Logging
    log.dirs=/var/lib/kafka/data
    auto.create.topics.enable=true
    
    # Increase message max bytes
    message.max.bytes=10485760
    socket.request.max.bytes=104857600
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: bookmanagement
  labels:
    app: kafka
    app.k8s.io/name: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
        app.k8s.io/name: kafka
    spec:
      containers:
      - name: kafka
        image: apache/kafka:3.7.0
        command: 
          - /bin/bash
          - -c
          - |
            # Clean old data
            rm -rf /var/lib/kafka/data/*
            
            # Generate cluster ID
            export CLUSTER_ID=$(/opt/kafka/bin/kafka-storage.sh random-uuid)
            
            # Format storage
            /opt/kafka/bin/kafka-storage.sh format -t $CLUSTER_ID -c /config/server.properties
            
            # Start Kafka
            /opt/kafka/bin/kafka-server-start.sh /config/server.properties
        ports:
        - containerPort: 9092
          name: kafka
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
        - name: kafka-config
          mountPath: /config
      volumes:
      - name: kafka-data
        emptyDir: {}
      - name: kafka-config
        configMap:
          name: kafka-config
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: bookmanagement
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  ports:
  - name: kafka
    port: 9092
    targetPort: 9092
